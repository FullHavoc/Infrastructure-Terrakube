name: Format Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tofu-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.15.5"
          tofu_wrapper: false

      - name: Check Terraform formatting
        run: tofu fmt -check -recursive

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check formatting
        run: npx --yes prettier --check "**/*.{yaml,yml,json,md}"
